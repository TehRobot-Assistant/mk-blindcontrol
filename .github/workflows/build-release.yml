name: Build + Release

# On tag push like `v9.3` → builds the firmware with PlatformIO, tags a GitHub
# release, and attaches the binary as `mk-blindcontrol.bin`. The
# `/releases/latest/download/mk-blindcontrol.bin` URL always redirects to the
# latest tagged build so users never have to update their flash-script URL.
#
# Also allows manual dispatch for ad-hoc rebuilds without a new tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # required to create releases + upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Build firmware
        run: pio run

      - name: Rename artefact
        run: |
          cp .pio/build/esp8266/firmware.bin mk-blindcontrol.bin
          sha256sum mk-blindcontrol.bin | tee mk-blindcontrol.bin.sha256

      - name: Upload build artefact (for workflow_dispatch + non-tag builds)
        uses: actions/upload-artifact@v4
        with:
          name: mk-blindcontrol.bin
          path: mk-blindcontrol.bin

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mk-blindcontrol.bin
            mk-blindcontrol.bin.sha256
          generate_release_notes: true
          draft: false
          prerelease: false

      # Keep version.json on `main` in sync with the latest release tag so
      # the firmware's /firmwarecheck endpoint reports the current version.
      # Runs only on tag pushes, straight after the release is published.
      - name: Update version.json on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          RELEASE="${TAG#v}"   # strip leading 'v' → "9.4"
          DATE="$(date -u +%d/%m/%Y)"
          cat > version.json <<JSON
          {"release":"V${RELEASE}","impact":"LOW","date":"${DATE}"}
          JSON
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout main
          git add version.json
          if git diff --cached --quiet; then
            echo "version.json unchanged, skip commit"
          else
            git commit -m "chore: bump version.json to ${TAG} [skip ci]"
            git push origin main
          fi
