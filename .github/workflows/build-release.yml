name: Build + Release

# On tag push like `v9.7` → builds the firmware with PlatformIO, tags a
# GitHub release, and attaches both `mk-blindcontrol.bin` and
# `version.json` as release assets. The firmware's "Update base URL"
# field points at `/releases/latest/download/`, and appends
# `mk-blindcontrol.bin` or `version.json` depending on whether it's
# updating or checking. A fork following the same shape (both files
# uploaded to their own release) works unchanged — paste the fork's
# base URL into the unit's Config page.
#
# Also allows manual dispatch for ad-hoc rebuilds without a new tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # required to create releases + upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Build firmware
        run: pio run

      - name: Rename artefact
        run: |
          cp .pio/build/esp8266/firmware.bin mk-blindcontrol.bin
          sha256sum mk-blindcontrol.bin | tee mk-blindcontrol.bin.sha256

      # Generate version.json from the tag so the firmware's Check button
      # reports the right release when it GETs /releases/latest/download/version.json.
      - name: Generate version.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          RELEASE="${TAG#v}"   # strip leading 'v' → "9.7"
          DATE="$(date -u +%d/%m/%Y)"
          printf '{"release":"V%s","impact":"LOW","date":"%s"}\n' "${RELEASE}" "${DATE}" > version.json
          cat version.json

      - name: Upload build artefact (for workflow_dispatch + non-tag builds)
        uses: actions/upload-artifact@v4
        with:
          name: mk-blindcontrol.bin
          path: mk-blindcontrol.bin

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mk-blindcontrol.bin
            mk-blindcontrol.bin.sha256
            version.json
          generate_release_notes: true
          draft: false
          prerelease: false

      # Also keep version.json in main up to date for anyone mirroring via
      # raw.githubusercontent.com/<org>/mk-blindcontrol/main/version.json.
      # Optional — release asset is the default path the firmware checks.
      - name: Update version.json on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euxo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout main
          git add version.json
          if git diff --cached --quiet; then
            echo "version.json unchanged, skip commit"
          else
            git commit -m "chore: bump version.json to ${GITHUB_REF#refs/tags/} [skip ci]"
            git push origin main
          fi
