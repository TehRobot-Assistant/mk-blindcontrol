; MK-BlindsControl V9.1 — community reliability patch.
;
; What changed from upstream v8:
;   * WiFiManager bumped from 0.16.0 (2020) to current 2.x — substantial
;     stability fixes on ESP8266
;   * MQTT packet buffer bumped via the MQTTClient constructor in main.cpp
;     (2048 bytes, was 1200). Note: the 256dpi/arduino-mqtt library is
;     configured purely via its constructor arg; there is no corresponding
;     preprocessor flag for this library (MQTT_MAX_PACKET_SIZE is a
;     PubSubClient-specific flag that has no effect here).
;   * -Os optimisation retained (default for Arduino framework); no debug
;     flags changed so flash size stays within ESP-12E budget

[env:esp8266]
platform = espressif8266
board = esp12e
framework = arduino

lib_deps =
	256dpi/MQTT@^2.5.0
	plapointe6/HAMqttDevice@^1.0.0
	tzapu/WiFiManager@^2.0.17
	bblanchon/ArduinoJson@^6.21.5
